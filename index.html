<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Pintar Online - SMP YPKKP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <header class="bg-blue-600 text-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">CBT Pintar Online</h1>
            <div class="space-x-2">
                <button onclick="pindahHalaman('siswa-login')" class="bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded text-sm font-semibold transition">Halaman Siswa</button>
                <button onclick="pindahHalaman('guru-dashboard')" class="bg-gray-700 hover:bg-gray-800 px-4 py-2 rounded text-sm font-semibold transition">Menu Guru</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto max-w-4xl p-4 mt-6">

        <section id="page-siswa-login" class="page bg-white p-6 rounded-lg shadow-md max-w-md mx-auto">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-600">Form Ujian Siswa</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Nama Lengkap</label>
                    <input type="text" id="siswa-nama" class="w-full border p-2 rounded focus:outline-blue-500" placeholder="Masukkan nama lengkap">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Nomor Induk Siswa (NIS)</label>
                    <input type="text" id="siswa-nis" class="w-full border p-2 rounded focus:outline-blue-500" placeholder="Masukkan NIS">
                </div>
                <button onclick="mulaiUjian()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded transition mt-2">Mulai Ujian Sekarang</button>
            </div>
        </section>

        <section id="page-siswa-ujian" class="page bg-white p-6 rounded-lg shadow-md hidden">
            <div class="flex justify-between items-center border-b pb-4 mb-4">
                <div>
                    <p class="font-bold text-lg" id="display-nama"></p>
                    <p class="text-sm text-gray-500" id="display-nis"></p>
                </div>
                <div class="text-right">
                    <p class="text-sm text-gray-500">Sisa Waktu</p>
                    <p class="text-xl font-bold text-red-500" id="timer">--:--</p>
                </div>
            </div>

            <div id="quiz-container" class="space-y-6">
                <p class="text-center text-gray-500">Memuat soal dari server cloud...</p>
            </div>

            <div class="mt-8 border-t pt-4">
                <button onclick="selesaiUjian()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg text-lg transition shadow">Selesai & Kirim Jawaban</button>
            </div>
        </section>

        <section id="page-guru-dashboard" class="page bg-white p-6 rounded-lg shadow-md hidden">
            <h2 class="text-2xl font-bold mb-6 text-gray-700 border-b pb-2">Panel Kontrol Guru</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-gray-50 p-4 rounded-lg border">
                    <h3 class="text-lg font-bold mb-4 text-blue-600">Tambah Soal Baru</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium">Pertanyaan</label>
                            <textarea id="input-soal" class="w-full border p-2 rounded h-20" placeholder="Tulis soal ujian di sini..."></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="pilihan-a" class="border p-2 rounded text-sm" placeholder="Pilihan A">
                            <input type="text" id="pilihan-b" class="border p-2 rounded text-sm" placeholder="Pilihan B">
                            <input type="text" id="pilihan-c" class="border p-2 rounded text-sm" placeholder="Pilihan C">
                            <input type="text" id="pilihan-d" class="border p-2 rounded text-sm" placeholder="Pilihan D">
                        </div>
                        <div>
                            <label class="block text-sm font-medium">Kunci Jawaban</label>
                            <select id="kunci-jawaban" class="w-full border p-2 rounded">
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                        <button onclick="tambahSoal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded">Simpan Soal ke Cloud</button>
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg border">
                    <h3 class="text-lg font-bold mb-4 text-green-600 flex justify-between items-center">
                        <span>Hasil Nilai Siswa</span>
                        <button onclick="muatHasilSiswa()" class="text-xs bg-gray-200 hover:bg-gray-300 px-2 py-1 rounded text-gray-700">🔄 Refresh</button>
                    </h3>
                    <div class="overflow-y-auto max-h-80">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="border-b bg-gray-200">
                                    <th class="p-2">Nama</th>
                                    <th class="p-2">NIS</th>
                                    <th class="p-2 text-center">Nilai</th>
                                </tr>
                            </thead>
                            <tbody id="tabel-hasil">
                                <tr>
                                    <td colspan="3" class="text-center p-4 text-gray-400">Belum ada siswa yang mengumpulkan.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // 1. KONFIGURASI SUPABASE (GANTI DENGAN KUNCI PROYEK ANDA)
        const SUPABASE_URL = "https://kxbciabquudwhnqrtpzv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4YmNpYWJxdXVkd2hucXJ0cHp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTkwMTksImV4cCI6MjA5NTQzNTAxOX0.qtVwjmUMuIAzLooN7eGi9bgBjtfY6fKzcp_VzNlCGJs";

        // Inisialisasi koneksi
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Variabel Aplikasi Global (Sudah Diperbaiki)
        let dataSoalGlobal = [];
        let dataSiswaSaatIni = { nama: "", nis: "" };

        // Fungsi Navigasi Antar Halaman
        function pindahHalaman(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            
            if(pageId === 'guru-dashboard') {
                muatHasilSiswa();
            }
        }

        // ================= LOGIKA KHUSUS GURU =================
        async function tambahSoal() {
            const pertanyaan = document.getElementById('input-soal').value;
            const a = document.getElementById('pilihan-a').value;
            const b = document.getElementById('pilihan-b').value;
            const c = document.getElementById('pilihan-c').value;
            const d = document.getElementById('pilihan-d').value;
            const kunci = document.getElementById('kunci-jawaban').value;

            if(!pertanyaan || !a || !b || !c || !d) {
                alert("Semua kolom pertanyaan dan pilihan jawaban wajib diisi!");
                return;
            }

            // Simpan ke Tabel `soal_ujian` Supabase
            const { error } = await supabase
                .from('soal_ujian')
                .insert([{ pertanyaan, pilihan_a: a, pilihan_b: b, pilihan_c: c, pilihan_d: d, kunci_jawaban: kunci }]);

            if (error) {
                alert("Gagal menyimpan ke cloud: " + error.message);
            } else {
                alert("Soal berhasil ditambahkan ke database cloud!");
                // Reset Form
                document.getElementById('input-soal').value = "";
                document.getElementById('pilihan-a').value = "";
                document.getElementById('pilihan-b').value = "";
                document.getElementById('pilihan-c').value = "";
                document.getElementById('pilihan-d').value = "";
            }
        }

        async function muatHasilSiswa() {
            const tbody = document.getElementById('tabel-hasil');
            tbody.innerHTML = `<tr><td colspan="3" class="text-center p-2">Memuat data...</td></tr>`;

            // Tarik data dari Tabel `hasil_ujian` Supabase
            const { data, error } = await supabase
                .from('hasil_ujian')
                .select('*')
                .order('waktu_selesai', { ascending: false });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center text-red-500 p-2">Error: ${error.message}</td></tr>`;
                return;
            }

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center p-4 text-gray-400">Belum ada siswa yang mengumpulkan.</td></tr>`;
                return;
            }

            tbody.innerHTML = "";
            data.forEach(hasil => {
                const row = `<tr class="border-b hover:bg-gray-100">
                    <td class="p-2 font-medium">${hasil.nama_siswa}</td>
                    <td class="p-2">${hasil.nomor_induk}</td>
                    <td class="p-2 text-center font-bold text-blue-600">${hasil.nilai}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }


        // ================= LOGIKA KHUSUS SISWA =================
        async function mulaiUjian() {
            const nama = document.getElementById('siswa-nama').value.trim();
            const nis = document.getElementById('siswa-nis').value.trim();

            if (!nama || !nis) {
                alert("Nama dan NIS tidak boleh kosong!");
                return;
            }

            dataSiswaSaatIni = { nama, nis };

            // Ambil seluruh kumpulan soal dari Supabase
            const { data, error } = await supabase
                .from('soal_ujian')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                alert("Gagal memuat soal ujian dari Cloud: " + error.message);
                return;
            }

            if (data.length === 0) {
                alert("Ujian belum siap. Guru belum memasukkan soal sama sekali di database!");
                return;
            }

            dataSoalGlobal = data;
            
            // Set Identitas di Header Lembar Ujian
            document.getElementById('display-nama').innerText = nama;
            document.getElementById('display-nis').innerText = "NIS: " + nis;

            // Render komponen soal ke layar
            renderSoalUjian();
            pindahHalaman('siswa-ujian');
        }

        function renderSoalUjian() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = "";

            dataSoalGlobal.forEach((soal, indeks) => {
                const HTMLSoal = `
                    <div class="p-4 border rounded-lg bg-gray-50 space-y-2 shadow-xs">
                        <p class="font-semibold text-md">${indeks + 1}. ${soal.pertanyaan}</p>
                        <div class="grid grid-cols-1 gap-2 pl-4">
                            <label class="flex items-center space-x-2 p-1 hover:bg-gray-200 rounded cursor-pointer">
                                <input type="radio" name="soal-${soal.id}" value="A" class="w-4 h-4 text-blue-600">
                                <span><strong>A.</strong> ${soal.pilihan_a}</span>
                            </label>
                            <label class="flex items-center space-x-2 p-1 hover:bg-gray-200 rounded cursor-pointer">
                                <input type="radio" name="soal-${soal.id}" value="B" class="w-4 h-4 text-blue-600">
                                <span><strong>B.</strong> ${soal.pilihan_b}</span>
                            </label>
                            <label class="flex items-center space-x-2 p-1 hover:bg-gray-200 rounded cursor-pointer">
                                <input type="radio" name="soal-${soal.id}" value="C" class="w-4 h-4 text-blue-600">
                                <span><strong>C.</strong> ${soal.pilihan_c}</span>
                            </label>
                            <label class="flex items-center space-x-2 p-1 hover:bg-gray-200 rounded cursor-pointer">
                                <input type="radio" name="soal-${soal.id}" value="D" class="w-4 h-4 text-blue-600">
                                <span><strong>D.</strong> ${soal.pilihan_d}</span>
                            </label>
                        </div>
                    </div>
                `;
                container.innerHTML += HTMLSoal;
            });
        }

        async function selesaiUjian() {
            if (!confirm("Apakah Anda yakin telah menyelesaikan semua soal dan ingin mengumpulkan?")) {
                return;
            }

            let jumlahBenar = 0;
            let logJawabanSiswa = {};

            // Hitung Lembar Jawaban Otomatis
            dataSoalGlobal.forEach(soal => {
                const pilihanTerpilih = document.querySelector(`input[name="soal-${soal.id}"]:checked`);
                const jawabanSiswa = pilihanTerpilih ? pilihanTerpilih.value : "-";
                
                logJawabanSiswa[soal.id] = jawabanSiswa;

                if (jawabanSiswa === soal.kunci_jawaban) {
                    jumlahBenar++;
                }
            });

            // Kalkulasi Rumus Nilai Standar (Skala 0 - 100)
            const nilaiAkhir = Math.round((jumlahBenar / dataSoalGlobal.length) * 100);

            // Simpan Hasil Ujian ke Tabel `hasil_ujian` Supabase Cloud
            const { error } = await supabase
                .from('hasil_ujian')
                .insert([
                    {
                        nama_siswa: dataSiswaSaatIni.nama,
                        nomor_induk: dataSiswaSaatIni.nis,
                        nilai: nilaiAkhir,
                        jawaban_siswa: logJawabanSiswa
                    }
                ]);

            if (error) {
                alert("Gagal mengirim lembar jawaban ke server: " + error.message);
            } else {
                alert(`Ujian selesai! Jawaban Anda terkirim secara aman.\nNilai Anda: ${nilaiAkhir}`);
                // Balikkan halaman ke form awal login siswa
                document.getElementById('siswa-nama').value = "";
                document.getElementById('siswa-nis').value = "";
                pindahHalaman('siswa-login');
            }
        }
    </script>
</body>
</html>
